<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Todo App</h1>
            <p>Stay organized and get things done</p>
        </header>

        <main class="app-main">
            <section class="add-todo-section">
                <form id="add-todo-form" class="add-todo-form">
                    <input 
                        type="text" 
                        id="todo-input" 
                        class="todo-input" 
                        placeholder="What needs to be done?"
                        maxlength="500"
                        required
                    >
                    <button type="submit" class="add-btn">Add Todo</button>
                </form>
            </section>

            <section class="todos-section">
                <div class="todos-header">
                    <div class="todos-stats">
                        <span id="total-todos">0 todos</span>
                        <span id="completed-todos">0 completed</span>
                    </div>
                    <div class="todos-filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                </div>

                <div id="todos-list" class="todos-list">
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">📝</div>
                        <h3>No todos yet</h3>
                        <p>Add a todo above to get started!</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>&copy; 2024 Todo App. Built with vanilla JavaScript.</p>
        </footer>
    </div>

    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <div id="error-toast" class="error-toast hidden">
        <span class="error-message"></span>
        <button class="close-error">&times;</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
