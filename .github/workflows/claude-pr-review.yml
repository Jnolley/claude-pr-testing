name: Claude PR Auto Review (Repo-Style Aware)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # (Optional but helpful) Run your linters/formatters in CHECK mode so Claude can assume they'll enforce style.
      # Node/TS (if present)
      - name: Lint (ESLint) — if Node project
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            echo "Installing deps (lockfile detected)…"
            if [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm i --frozen-lockfile; \
            elif [ -f yarn.lock ]; then yarn --frozen-lockfile; \
            else npm ci; fi
          fi
          npx --yes eslint . || true

      - name: Format check (Prettier) — if Node project
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          npx --yes prettier -c . || true

      # Python (if present)
      - name: Lint/format check (Python) — if Python project
        if: ${{ hashFiles('**/pyproject.toml') != '' || hashFiles('**/requirements*.txt') != '' }}
        run: |
          python -m pip install --upgrade pip || true
          pip install black isort flake8 || true
          black --check . || true
          isort --check-only . || true
          flake8 || true

      # Ruby (if present)
      - name: Lint/format check (Ruby) — if Ruby project
        if: ${{ hashFiles('**/Gemfile') != '' }}
        run: |
          gem install rubocop || true
          rubocop || true

      - name: Run Claude Code review (style-aware, best-practice suggestions)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Please review this pull request for security issues, bugs, and best practices. 
            
            For any issues you find, please:
            1. Use the mcp__github_comment__update_claude_comment tool to post review comments
            2. Include specific code suggestions using GitHub's suggestion format
            3. Mark severity as **Blocking** or **Non-blocking**
            4. Focus on security, correctness, and maintainability
            
            /review
          claude_args: |
            --model claude-3-5-haiku-20241022
            --max-turns 10