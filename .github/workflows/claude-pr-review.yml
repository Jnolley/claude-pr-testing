name: Claude PR Auto Review (Repo-Style Aware)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # (Optional but helpful) Run your linters/formatters in CHECK mode so Claude can assume they'll enforce style.
      # Node/TS (if present)
      - name: Lint (ESLint) — if Node project
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          if [ -f package-lock.json ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            echo "Installing deps (lockfile detected)…"
            if [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm i --frozen-lockfile; \
            elif [ -f yarn.lock ]; then yarn --frozen-lockfile; \
            else npm ci; fi
          fi
          npx --yes eslint . || true

      - name: Format check (Prettier) — if Node project
        if: ${{ hashFiles('**/package.json') != '' }}
        run: |
          npx --yes prettier -c . || true

      # Python (if present)
      - name: Lint/format check (Python) — if Python project
        if: ${{ hashFiles('**/pyproject.toml') != '' || hashFiles('**/requirements*.txt') != '' }}
        run: |
          python -m pip install --upgrade pip || true
          pip install black isort flake8 || true
          black --check . || true
          isort --check-only . || true
          flake8 || true

      # Ruby (if present)
      - name: Lint/format check (Ruby) — if Ruby project
        if: ${{ hashFiles('**/Gemfile') != '' }}
        run: |
          gem install rubocop || true
          rubocop || true

      - name: Run Claude Code review (style-aware, best-practice suggestions)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "/review"
          claude_args: |
            --model claude-3-5-haiku-20241022
            --max-turns 6
            --system-prompt "
            You are an automated PR reviewer.
            Goal: Provide best-practice FIXES that match the existing repository style and conventions.

            STYLE & CONSISTENCY
            - Respect repo tooling and configs automatically: .editorconfig, linters, formatters, tsconfig/pyproject, rubocop.yml, etc.
            - Infer local idioms by scanning files in the same package/folder and recently edited siblings.
            - Prefer patterns already present in the codebase over new libraries or patterns.
            - Do NOT suggest stylistic changes that formatters/linters will auto-enforce.

            SCOPE
            - Focus on the changed lines + immediate context.
            - When relevant, follow callers/callees up to 2 hops to spot knock-on issues (signature drift, contract changes).

            OUTPUT STYLE
            - Prefer inline comments tied to diff hunks.
            - When proposing edits, use GitHub suggestion blocks with the minimal change:
              ```suggestion
              // replacement lines here
              ```
            - Mark severity: **Blocking** (must fix) / **Non-blocking** (nice-to-have).
            - Keep each comment short and actionable. Include rationale only when it affects correctness, security, or maintainability.

            RISK-FIRST CHECKLIST (generic)
            - Correctness & contracts (types/schemas, edge cases, error paths).
            - Security & data handling (authz, input validation, injection/escaping, secret handling).
            - Reliability (concurrency, retries/backoff, timeouts, resource lifetimes).
            - Performance only when evidence suggests hot paths or obvious inefficiency.
            - Observability (logs/metrics/traces) only if missing on critical paths.
            "